<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Last-Modified" content="0">
    <title>APP PEPS</title>
    <style>
        .error{
            display: none;
            color: red;
        }
    </style>
    <script>
        function conectar(){
            document.getElementsByClassName("error")[0].style.display="none";
            
            // Creamos las cabeceras de forma limpia en cada petición
            var myHeaders = new Headers();
            myHeaders.append("Content-Type", "application/json");

            // Recogemos los datos (ahora "profile" sí se leerá porque es readonly)
            var raw = JSON.stringify({
                "username": document.getElementById("username").value,
                "password": document.getElementById("password").value,
                "profile": document.getElementById("profile").value
            });

            var requestOptions = {
                method: 'POST',
                headers: myHeaders,
                body: raw
            };

            // Ejecutamos la petición hacia el proxy de Apache
            fetch("/api/usuarios/registro", requestOptions)
                .then(response => {
                    if (!response.ok) {
                        // Si devuelve 400, 401 o 500, lanzamos error para controlarlo abajo
                        throw new Error("Error en la petición del servidor");
                    }
                    return response.json();
                })
                .then(result => {
                    if (result.status == "OK"){
                        alert("Usuario registrado correctamente");
                        location.href = "index.html";
                    } else {
                        document.getElementsByClassName("error")[0].style.display = "block";
                    }
                })
                .catch(error => {
                    console.log('error', error);
                    alert("Error crítico en el registro. Revisa la consola del navegador.");
                }); 
        }
    </script>
</head>
<body>
    <h1>REGISTRO DEL SISTEMA</h1>
    <label>Usuario</label><input type="text" name="username" id="username" required><br>
    <label>Clave</label><input type="password" name="password" id="password" required><br>
    
    <!-- CORRECCIÓN: Cambiado 'disabled' por 'readonly' para que JS pueda leer su valor -->
    <label>Perfil</label><input type="text" readonly name="profile" id="profile" value="normal"><br>
    
    <label class="error">Usuario ya existe o datos inválidos</label>
    <button type="button" onclick="conectar()">ENVIAR</button>
</body>
</html>

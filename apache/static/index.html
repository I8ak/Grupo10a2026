<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Last-Modified" content="0">
    <title>APP PEPS</title>
    <style>
        .error {
            display: none;
            color: red;
        }
    </style>
    <script>
        function verComentarios() {
            location.href = "comentarios.html";
        }

        function conectar() {
            // Ocultamos el error al intentar un nuevo login
            document.getElementsByClassName("error")[0].style.display = "none";
            
            // CORRECCIÓN: Inicializamos las cabeceras limpias dentro de la función
            var myHeaders = new Headers();
            myHeaders.append("Content-Type", "application/json");

            // Recogemos las credenciales
            var raw = JSON.stringify({
                "username": document.getElementById("username").value,
                "password": document.getElementById("password").value
            });

            var requestOptions = {
                method: 'POST',
                headers: myHeaders,
                body: raw
            };

            // Realizamos la petición al endpoint exento de CSRF
            fetch("/api/usuarios/login", requestOptions)
                .then(response => {
                    if (!response.ok) {
                        // Si el servidor responde con 400, 401 o 500, saltamos al catch
                        throw new Error("Fallo en la respuesta del servidor");
                    }
                    return response.json();
                })
                .then(result => {
                    if (result.status == "OK") {
                        // Guardamos el token CSRF que nos devuelve el backend en el almacenamiento local
                        // por si lo necesitas para futuras peticiones autenticadas (como añadir perfumes)
                        if (result.csrf_token) {
                            localStorage.setItem("csrf_token", result.csrf_token);
                        }
                        
                        // Redirección exitosa
                        location.href = "perfumes.html";
                    } else {
                        // Mostramos el mensaje de error si las credenciales fallan o el usuario está bloqueado
                        document.getElementsByClassName("error")[0].style.display = "block";
                    }
                })
                .catch(error => {
                    console.log('error', error);
                    alert("Error al conectar con el servidor. Revisa las credenciales o la consola.");
                });
        }
    </script>
</head>

<body>
    <h1>BIENVENIDO AL SISTEMA DE DANIEL E ISHAK PERFUMES</h1>
    <label>Usuario</label><input type="text" name="username" id="username" required><br>
    <label>Clave</label><input type="password" name="password" id="password" required><br>
    <label class="error">Usuario/clave erronea o cuenta bloqueada</label>
    <button type="button" onclick="conectar()">ENVIAR</button>
    <button type="button" onclick="location.href='registro.html'">REGISTRARSE</button>

    <section class="section">
        <div class="columns">
            <div class="column">
                 <h3 class="is-size-3">Ver Comentarios</h3>
                <button type="button" onclick="verComentarios()" class="button is-success mt-2">Ver comentarios</button>
            </div>
        </div>
    </section>
</body>

</html>
